<html lang="en" dir="ltr">
 <head>
  <meta charset="UTF-8">
  <title> Math Ridge Responsive Registration Form </title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 </head>
 <body>
  <div class="container">
   <div class="title">Registration</div>
    <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="80a34395-a61f-408c-9289-3be412d5f31e">
     <div class="user-details">
      <div class="input-box">
        <span class="details">Parent's Name</span>
        <input type="text" name="ParentName" placeholder="Enter Parent's Name" required>
      </div>
      <div class="input-box">
        <span class="details">Student's Name</span>
        <input type="text" name="StudentName" placeholder="Enter Student's name" required>
      </div>
      <div class="input-box">
        <span class="details">Grade</span>
        <input type="text" name="Grade" placeholder="(1~12); Other specify" required>
      </div>
      <div class="input-box">
        <span class="details">Current Math Class</span>
        <input type="text" name="Subject" placeholder="Enter math subject" required>
      </div>
      <div class="input-box">
        <span class="details">Email</span>
        <input type="email" name="Email" placeholder="Enter your email" required>
      </div>
      <div class="input-box">
        <span class="details">Phone Number</span>
        <input type="text" name="PhoneNumber" placeholder="Enter your number" required>
      </div>
     </div>
     <div class="gender-details">
      <input type="radio" name="gender" value="Male" id="dot-1">
      <input type="radio" name="gender" value="Female" id="dot-2">
      <input type="radio" name="gender" value="None" id="dot-3">
       <span class="gender-title">Student's Gender</span>
       <div class="category">
      <label for="dot-1">
       <span class="dot one"></span>
       <span class="gender">Male</span>
      </label>
      <label for="dot-2">
       <span class="dot two"></span>
       <span class="gender">Female</span>
      </label>
      <label for="dot-3">
       <span class="dot three"></span>
       <span class="gender">Prefer not to say</span>
      </label>
     </div>
    </div>
    <div class="button">
      <input type="submit" value="Request My Free Assessment">
      <span>Students typically improve 1–2 letter grades within a few months</span>
    </div>
   </form>
  </div>
 </body>
</html>
