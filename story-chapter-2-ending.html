<body data-story-mode="chapter2-ending">
  <div class="story-progress" aria-hidden="true">
    <span id="storyProgressBar"></span>
  </div>

  <main class="story-vn root-gate-story chapter-two-story" aria-label="Season 1 ending visual story">
    <div class="scene-bg" id="sceneBg" aria-hidden="true"></div>
    <div class="scene-shade" aria-hidden="true"></div>
    <div class="scene-fader" id="sceneFader" aria-hidden="true"></div>

    <div class="blackboard-stage is-hidden" id="blackboardStage" aria-hidden="true"></div>

    <header class="story-topbar">
      <a href="index.html?view=quest#quest" aria-label="Back to Mountain Trail">Trail</a>
      <strong>Season 1 Ending</strong>
      <div class="story-topbar-tools">

        <button type="button" class="story-help-toggle" id="storyHelpBtn" aria-label="Show story controls">i</button>

    <div class="character-stage mira-stage is-hidden" id="miraStage" aria-hidden="true">
      <img class="character-sprite mira-sprite" id="miraSprite" alt="" draggable="false" />

    <div class="character-stage elder-stage is-hidden" id="elderStage" aria-hidden="true">
      <img class="character-sprite elder-sprite" id="elderSprite" alt="" draggable="false" />
    </div>

    <div class="relic-reveal-stage" id="relicRevealStage" aria-hidden="true">
      <div class="story-relic relic-term" data-relic="term">
        <span class="relic-light" aria-hidden="true"></span>
        <img src="assets/images/relic/Shelf_Scale_Relic_True_Alpha.png" alt="" draggable="false" decoding="async" loading="eager" />
        <span>The Shelf Scale</span>
      </div>
      <div class="story-relic relic-sign" data-relic="sign">
        <span class="relic-light" aria-hidden="true"></span>
        <img src="assets/images/relic/primewood_seed_relic_true_alpha.png?v=20260610-primewood-refresh" alt="" draggable="false" decoding="async" loading="eager" />
        <span>The Primewood Seed</span>
      </div>
      <div class="story-relic relic-parity" data-relic="parity">
        <span class="relic-light" aria-hidden="true"></span>
        <img src="assets/images/relic/fraction_loom_relic_true_alpha.png?v=20260610-fraction-loom-refresh" alt="" draggable="false" decoding="async" loading="eager" />
        <span>The Fraction Loom</span>
      </div>
      <div class="story-relic relic-factor" data-relic="factor">
        <span class="relic-light" aria-hidden="true"></span>
        <img src="assets/images/relic/power_tally_relic_true_alpha.png?v=20260610-power-tally-refresh" alt="" draggable="false" decoding="async" loading="eager" />
        <span>The Power Tally</span>
      </div>
    </div>

    <section class="interaction-panel hidden" id="interactionPanel" aria-live="polite">
      <form class="name-form hidden" id="nameForm"></form>
      <div class="choice-row hidden" id="choiceRow"></div>
      <div class="feedback-text hidden" id="feedbackText"></div>
    </section>

    <section class="dialogue-box" aria-live="polite">
      <div class="dialogue-meta">
        <span id="speakerName">Narrator</span>
        <span id="sceneCounter">1 / 1</span>
      </div>

      <p id="dialogueText"></p>

      <div class="dialogue-actions">
        <button type="button" id="backBtn">Back</button>
        <button type="button" id="nextBtn">Next</button>
      </div>
    </section>

    <div class="reward-panel hidden" id="rewardPanel" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
      <div class="reward-card" id="rewardCard"></div>
    </div>
  </main>

  <aside class="orientation-lock" aria-live="polite">
    <strong>Turn Sideways</strong>
    <span>This ending scene is designed for a wide game view.</span>
